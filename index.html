<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Draft Hub | 시안 공유 센터 (Green Theme)</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(15, 23, 42, 0.08);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent-gradient: linear-gradient(135deg, #10b981 0%, #047857 100%);
            --accent-primary: #059669;
            --accent-glow: rgba(16, 185, 129, 0.12);
            --toast-bg: #064e3b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(16, 185, 129, 0.08) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(52, 211, 153, 0.05) 0px, transparent 50%);
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem 1.5rem;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        /* Header Style */
        header {
            margin-bottom: 3rem;
            text-align: center;
            position: relative;
        }

        .logo-area {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 300;
        }

        /* Controls: Search and Tabs */
        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 250px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main);
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
        }

        .search-box input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .search-box svg {
            position: absolute;
            left: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            fill: var(--text-muted);
            width: 16px;
            height: 16px;
        }

        /* Projects Section */
        .project-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .project-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.75rem;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.03);
        }

        .project-card:hover {
            transform: translateY(-2px);
            border-color: rgba(16, 185, 129, 0.3);
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        .project-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .project-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .project-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.6rem;
            border-radius: 99px;
            background: rgba(16, 185, 129, 0.08);
            color: var(--accent-primary);
            font-weight: 500;
            border: 1px solid rgba(16, 185, 129, 0.15);
        }

        .project-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: right;
        }

        /* Versions Timeline */
        .version-list {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .version-row {
            display: grid;
            grid-template-columns: 120px 1fr;
            align-items: center;
            gap: 1rem;
            position: relative;
            padding-left: 0.5rem;
        }

        .version-row::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 70%;
            background: var(--accent-gradient);
            border-radius: 4px;
            opacity: 0.7;
        }

        .version-tag {
            font-weight: 600;
            color: var(--text-main);
            font-size: 1rem;
            display: flex;
            flex-direction: column;
        }

        .version-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: 0.15rem;
        }

        .pages-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .page-link-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1rem;
            background: rgba(15, 23, 42, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .page-link-btn:hover {
            background: rgba(16, 185, 129, 0.08);
            border-color: rgba(16, 185, 129, 0.3);
            color: var(--accent-primary);
        }

        .copy-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.25rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            border-radius: 4px;
            transition: all 0.2s ease;
            margin-left: 0.25rem;
        }

        .copy-btn:hover {
            color: var(--accent-primary);
            background: rgba(16, 185, 129, 0.08);
        }

        .copy-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px dashed var(--border-color);
        }

        .empty-state svg {
            width: 48px;
            height: 48px;
            fill: var(--text-muted);
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Toast Alert */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--toast-bg);
            border-left: 4px solid #34d399;
            color: #fff;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(15,23,42,0.15);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1000;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .version-row {
                grid-template-columns: 1fr;
                gap: 0.5rem;
                padding-bottom: 0.75rem;
                border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            }
            .version-row::before {
                height: 30px;
                top: 15px;
            }
            .version-tag {
                flex-direction: row;
                gap: 0.75rem;
                align-items: center;
            }
            .version-date {
                margin-top: 0;
            }
        }
    </style>
</head>
<body>

    <!-- Toast Component -->
    <div class="toast" id="copy-toast">
        <svg style="width:18px;height:18px;fill:#818cf8" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        <span>클립보드에 링크가 복사되었습니다!</span>
    </div>

    <script>
        // Copy Link Function
        function copyLink(path) {
            // URL 결합 논리 (도메인 감지)
            const origin = window.location.origin;
            const pathname = window.location.pathname;
            const dirPath = pathname.substring(0, pathname.lastIndexOf('/') + 1);
            const fullUrl = origin + dirPath + path;

            navigator.clipboard.writeText(fullUrl).then(() => {
                showToast();
            }).catch(err => {
                console.error('복사 실패: ', err);
            });
        }

        // Toast Trigger
        function showToast() {
            const toast = document.getElementById('copy-toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // Live Search Filter
        function filterProjects() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const cards = document.querySelectorAll('.project-card');
            let hasResults = false;

            cards.forEach(card => {
                const searchData = card.getAttribute('data-name').toLowerCase();
                if (searchData.includes(query)) {
                    card.style.display = 'block';
                    hasResults = true;
                } else {
                    card.style.display = 'none';
                }
            });
        }
    </script>
